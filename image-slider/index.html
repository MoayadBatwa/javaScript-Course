<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Image Slider</title>
  </head>
  <body>
    <div class="slideContainer">
      <img class="mob"  src="images/creeper.jpg" alt="creeper" />
      <img class="mob" src="images/skeleton.jpg" alt="skeleton" />
      <img class="mob" src="images/zombie.jpg" alt="zombie" />
      <img class="mob" src="images/herobrine.jpg" alt="heroBrine" />

      <button onclick="previousSlide()" id="previousButton">&Larr;</button>
      <button onclick="nextSlide()" id="nextButton">&Rarr;</button>
    </div>
  </body>
  <script src="index.js"></script>
</html>
