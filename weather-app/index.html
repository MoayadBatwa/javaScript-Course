<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <form class="weatherForm">
      <input type="text" class="input" placeholder="Enter a City Name" />
      <button type="submit">Get Weather</button>
    </form>

    <div class="weatherContainer" style="display: none;">
      <h1 class="cityDisplay">City</h1>
      <h1 class="tempDisplay">temp</h1>
      <p class="humidityDisplay">Humidity</p>
      <p class="descriptionDisplay">how is sky</p>
      <p class="emojiDisplay">☀️</p>
    </div>
  </body>
  <script src="index.js"></script>
</html>
