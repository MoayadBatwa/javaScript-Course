<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Temperature Conversion</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1 id="title">Temperature conversion:</h1>

      <input id="input" type="text"/>

      <div>
        <input type="radio" name="temperature" id="celsiusToFahrenheit" value="Celsius" />
        <label for="Celsius">Celsius &rarr; Fahrenheit</label>
        <br />
      </div>

      <div>
        <input
          type="radio"
          name="temperature"
          id="fahrenheitToCelsius"
          value="Fahrenheit"
        />
        <label for="Fahrenheit">Fahrenheit &rarr; Celsius</label>
        <br />
      </div>

      <button id="submitBtn">Submit</button>

      <div id="result">xxxx</div>
    </div>
  </body>

  <script src="index.js"></script>
</html>
