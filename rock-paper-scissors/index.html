<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Rock-Paper-Scissors Game</title>
</head>
<body>
    <div id="title">Rock - Paper - Scissors</div>

    <div id="playerChoices">
        <button class='playerChoice' id="rock">Rock</button>
        <button class='playerChoice' id="paper">Paper</button>
        <button class='playerChoice' id="scissors">Scissors</button>
    </div>

    <div class="choice" id="playerChoice">Player: </div>
    <div class="choice" id="copmuterChoice">Computer: </div>

    <div id="result">You win!</div>

    <div class="score" id="playerScore">Player Score: </div>
    <div class="score" id="computerScore">Computer Score: </div>
    
</body>
<script src="index.js"></script>
</html>
