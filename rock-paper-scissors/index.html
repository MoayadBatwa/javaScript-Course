<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Rock-Paper-Scissors Game</title>
</head>
<body>
    <div id="title">Rock - Paper - Scissors</div>

    <div id="playerChoices">
        <img src="images/rock.jpg" class='playerChoice' id="rock">
        <img src="images/paper.jpg" class='playerChoice' id="paper">
        <img src="images/sicssors.jpg" class='playerChoice' id="scissors">
    </div>

    <div class="choice" id="playerChoice">Player: </div>
    <div class="choice" id="computerChoice">Computer: </div>

    <div id="result">You win!</div>

    <div class="score" >Player Score: <span class="win" id="playerScore">0</span></div>
    <div class="score" >Computer Score: <span class="lose" id="computerScore">0</span></div>
    
</body>
<script src="index.js"></script>
</html>
